<main class="container">
  <nav>
    <ul>
      <li class="text-primary">Dungeon Crawler Carl Companion</li>
    </ul>
  </nav>
  <div class="grid">
    <div>
      <app-book-list [bookList]="books" (onSelectChapter)="onChapterSelect($event)" (onSelectBook)="onBookSelect($event)"></app-book-list>

    <div>

    </div>
  </div>
